<!DOCTYPE html>
<html>
<head>
  <script>
    var l = window.location;
    var base = '/xpp/';
    var rel = l.pathname.slice(base.length - 1) || '/';
    l.replace(
      l.protocol + '//' + l.host + base +
      '?/' + rel.slice(1).replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
</html>
